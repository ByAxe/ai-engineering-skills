# Starter detekt configuration for cleanup work.
# Adjust to your detekt version and project conventions.

config:
  validation: true
  warningsAsErrors: false

build:
  maxIssues: 0

complexity:
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7
  TooManyFunctions:
    active: true
    thresholdInFiles: 25
    thresholdInClasses: 15
    thresholdInInterfaces: 15
    thresholdInObjects: 15

exceptions:
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Error
      - Exception
      - RuntimeException
      - Throwable
  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - Error
      - Exception
      - RuntimeException
      - Throwable

performance:
  SpreadOperator:
    active: true

potential-bugs:
  AvoidReferentialEquality:
    active: true
  ImplicitDefaultLocale:
    active: true

style:
  MagicNumber:
    active: true
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
  ReturnCount:
    active: true
    max: 3
  ThrowsCount:
    active: true
    max: 2
  WildcardImport:
    active: true
  ForbiddenComment:
    active: false
  NewLineAtEndOfFile:
    active: true
  MayBeConst:
    active: true

naming:
  FunctionNaming:
    active: true
  ClassNaming:
    active: true
  VariableNaming:
    active: true
  TopLevelPropertyNaming:
    active: true
  ConstructorParameterNaming:
    active: true
